name: Cypress tests
run-name: ${{ github.event_name == 'pull_request' && format('Testing on {0}', github.head_ref) || 'Testing on main' }}

on:
  pull_request:
    paths:
      - 'cypress/**'
  workflow_dispatch:
    inputs:
      device:
        description: Device
        required: true
        default: 'MacBook'
        type: 'choice'
        options:
          - 'MacBook'
          - 'iPad'
          - 'iPhone'
      browser:
        description: Browser
        required: true
        default: 'Chrome'
        type: 'choice'
        options:
          - 'Chrome'
          - 'Firefox'
          - 'Edge'

jobs:
  cypress:
    name: Cypress tests
    runs-on: ubuntu-latest
    env:
      device: ${{ inputs.device || 'MacBook' }}
      browser: ${{ inputs.browser || 'Chrome' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: '.'
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ env.browser.toLowerCase }}
          env: DEVICE=${{ env.device }}
          spec: cypress/tests/demoqa/*.cy.ts
