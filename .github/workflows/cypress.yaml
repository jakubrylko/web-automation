name: Cypress tests
run-name: ${{ github.event_name == 'pull_request' && format('Testing on {0}', github.head_ref) || 'Testing on main' }}

on:
  pull_request:
    paths:
      - '.github/workflows/cypress.yaml'
      - 'cypress/**'
  workflow_dispatch:
    inputs:
      device:
        description: Device
        required: true
        default: 'MacBook'
        type: 'choice'
        options:
          - 'MacBook'
          - 'iPad'
          - 'iPhone'
      browser:
        description: Browser
        required: true
        default: 'Chrome'
        type: 'choice'
        options:
          - 'Chrome'
          - 'Firefox'
          - 'Edge'

jobs:
  cypress:
    name: Cypress tests
    runs-on: ubuntu-latest
    env:
      device: ${{ inputs.device || 'MacBook' }}
      browser: ${{ inputs.browser.toLowerCase || 'chrome' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run Cypress tests
        run: DEVICE=$device yarn cypress run --spec cypress/tests/demoqa --browser=$browser
      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 15
